name: FV Sync — Sincronización plantas fotovoltaicas

on:
  # Cada hora en punto (datos casi en tiempo real)
  # El cron nocturno de las 01:00 UTC también cierra el KPI diario del día anterior
  schedule:
    - cron: "0 * * * *"

  # Lanzamiento manual desde GitHub Actions UI
  workflow_dispatch:
    inputs:
      empresa_id:
        description: "UUID de empresa (vacío = todas)"
        required: false
        default: ""
      dry_run:
        description: "Dry-run (no escribe en BD)"
        type: boolean
        default: false

jobs:
  sync:
    name: Sincronizar plantas FV
    # ubuntu-22.04: ubuntu-latest ya es Ubuntu 24 donde libasound2 no existe como paquete.
    # Playwright 1.44 necesita libasound2 → usamos 22.04 donde sí está disponible.
    runs-on: ubuntu-22.04
    timeout-minutes: 20

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "scripts/fv-sync/requirements.txt"

      - name: Instalar dependencias Python
        run: pip install -r scripts/fv-sync/requirements.txt

      - name: Instalar Playwright + Chromium
        run: playwright install chromium --with-deps

      - name: Ejecutar sincronización
        working-directory: scripts/fv-sync
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          FV_ENCRYPTION_KEY:    ${{ secrets.FV_ENCRYPTION_KEY }}
          RESEND_API_KEY:       ${{ secrets.RESEND_API_KEY }}
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.empresa_id }}" ]; then
            ARGS="$ARGS --empresa ${{ github.event.inputs.empresa_id }}"
          fi
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          python sync_job.py $ARGS

      - name: Notificar fallo por Slack (opcional)
        if: failure() && vars.NOTIFY_SLACK == 'true'
        run: |
          curl -s -X POST "${{ secrets.SLACK_WEBHOOK }}" \
            -H "Content-Type: application/json" \
            -d '{"text": "⚠️ FV Sync falló — revisar logs en GitHub Actions"}'
