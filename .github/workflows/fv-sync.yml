name: FV Sync — Sincronización plantas fotovoltaicas

on:
  # Una vez al día a las 07:00 UTC = 08:00 España (horario invierno) / 09:00 (horario verano)
  # GitHub Actions usa UTC — no ajusta DST automáticamente.
  schedule:
    - cron: "0 7 * * *"

  # Lanzamiento manual desde GitHub Actions UI o desde el CRM (via Edge Function trigger-fv-sync)
  workflow_dispatch:
    inputs:
      credencial_id:
        description: "UUID de credencial FV (vacío = todas)"
        required: false
        default: ""
      empresa_id:
        description: "UUID de empresa (vacío = todas)"
        required: false
        default: ""
      dry_run:
        description: "Dry-run (no escribe en BD)"
        type: boolean
        default: false

concurrency:
  group: fv-sync
  cancel-in-progress: false   # no cancelar un sync en curso si llega otro

jobs:
  sync:
    name: Sincronizar plantas FV
    # ubuntu-22.04: ubuntu-latest ya es Ubuntu 24 donde libasound2 no existe como paquete.
    # Playwright 1.44 necesita libasound2 → usamos 22.04 donde sí está disponible.
    runs-on: ubuntu-22.04
    timeout-minutes: 20

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "scripts/fv-sync/requirements.txt"

      - name: Instalar dependencias Python
        run: pip install -r scripts/fv-sync/requirements.txt

      - name: Instalar Playwright + Chromium
        run: playwright install chromium --with-deps

      - name: Diagnóstico de entorno
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          FV_ENCRYPTION_KEY:    ${{ secrets.FV_ENCRYPTION_KEY }}
        run: |
          echo "=== FV Sync — Diagnóstico de entorno ==="
          echo "Fecha/hora UTC: $(date -u '+%Y-%m-%dT%H:%M:%S UTC')"
          echo "Runner OS: $RUNNER_OS"
          echo "Python: $(python --version)"
          echo "Playwright: $(playwright --version 2>/dev/null || echo 'no disponible')"
          echo "SUPABASE_URL presente: $( [ -n "$SUPABASE_URL" ] && echo 'SI' || echo 'NO ❌' )"
          echo "SUPABASE_SERVICE_KEY presente: $( [ -n "$SUPABASE_SERVICE_KEY" ] && echo 'SI' || echo 'NO ❌' )"
          echo "FV_ENCRYPTION_KEY presente: $( [ -n "$FV_ENCRYPTION_KEY" ] && echo 'SI' || echo 'NO ❌' )"
          echo "Chromium: $(which chromium-browser 2>/dev/null || which chromium 2>/dev/null || echo 'no en PATH — usa Playwright')"
          echo "========================================"

      - name: Ejecutar sincronización
        working-directory: scripts/fv-sync
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          FV_ENCRYPTION_KEY:    ${{ secrets.FV_ENCRYPTION_KEY }}
          RESEND_API_KEY:       ${{ secrets.RESEND_API_KEY }}
          # Inputs via env vars — NUNCA expandir ${{ inputs.xxx }} directamente
          # en el bloque run: (se expande en tiempo de compilación YAML, antes
          # de que el shell lo evalúe, causando inyección de valores inesperados).
          INPUT_CREDENCIAL_ID:  ${{ inputs.credencial_id }}
          INPUT_EMPRESA_ID:     ${{ inputs.empresa_id }}
          INPUT_DRY_RUN:        ${{ inputs.dry_run }}
        run: |
          ARGS=""
          if [ -n "$INPUT_CREDENCIAL_ID" ]; then
            ARGS="$ARGS --credencial $INPUT_CREDENCIAL_ID"
          fi
          if [ -n "$INPUT_EMPRESA_ID" ]; then
            ARGS="$ARGS --empresa $INPUT_EMPRESA_ID"
          fi
          if [ "$INPUT_DRY_RUN" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          echo "ARGS finales: $ARGS"
          python sync_job.py $ARGS
